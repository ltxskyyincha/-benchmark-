{% extends "base.html" %}
{% block head %}<style>.doc-body{max-width:900px;margin:0 auto;padding:24px} .doc-body h1{font-size:28px;margin-bottom:8px} .doc-body h2{border-bottom:2px solid #e0e0e0;padding-bottom:8px;margin-top:32px} .doc-body h3{margin-top:24px} .doc-body table{width:100%;border-collapse:collapse;margin:12px 0} .doc-body th,.doc-body td{border:1px solid #ddd;padding:6px 10px;text-align:left;font-size:14px} .doc-body th{background:#f5f5f5} .doc-body code{background:#f1f5f9;padding:1px 5px;border-radius:3px;font-size:13px} .doc-body pre{background:#1e293b;color:#e2e8f0;padding:16px;border-radius:8px;overflow-x:auto;font-size:13px} .doc-body pre code{background:none;color:inherit;padding:0} .doc-body blockquote{border-left:4px solid #3b82f6;margin:12px 0;padding:8px 16px;background:#f8fafc;color:#475569}</style>{% endblock %}
{% block content %}
<div class="doc-body" id="doc-content">加载中...</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
<script>
fetch('/static/docs.md').then(r=>r.text()).then(md=>{
  document.getElementById('doc-content').innerHTML=marked.parse(md);
});
</script>
{% endblock %}
