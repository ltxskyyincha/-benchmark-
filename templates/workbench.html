{% extends "base.html" %}
{% block title %}工作台{% endblock %}
{% block content %}
<div class="wb">
  <!-- ═══ 左栏 ═══ -->
  <aside class="wb-left">
    <div class="panel">
      <div class="panel-hd">用例列表
        <div class="actions">
          <button class="btn-icon" onclick="addCase()" title="新建用例">＋</button>
          <button class="btn-icon" onclick="exportBenchmark()" title="导出 JSON">⬇</button>
        </div>
      </div>
      <div class="panel-body" id="case-list"></div>
    </div>
    <div class="panel" style="flex:1;display:flex;flex-direction:column">
      <div class="panel-hd">几何对象库</div>
      <div class="panel-body" id="geo-list" style="flex:1;overflow-y:auto"></div>
      <div class="panel-ft">
        <button class="btn btn-xs" onclick="startDraw('polygon')">⬡ 画多边形</button>
        <button class="btn btn-xs" onclick="startDraw('polyline')">〰 画折线</button>
        <button class="btn btn-xs" onclick="startPointGroup()">📍 创建点组</button>
        <button class="btn btn-xs" onclick="toggleEntitySearch()">🎯 选实体</button>
      </div>
    </div>
    <div class="panel">
      <div class="panel-hd">地图选择</div>
      <div style="padding:8px 12px">
        <select id="sel-map" class="input input-sm" onchange="switchMap(this.value)">
          <option value="">选择地图...</option>
        </select>
      </div>
    </div>
  </aside>

  <!-- ═══ 地图区 ═══ -->
  <section class="wb-center">
    <div id="map" class="wb-map"></div>
    <!-- 地图工具条 -->
    <div class="map-toolbar" id="map-toolbar">
      <button class="tool-btn active" onclick="setMapMode('browse')" id="tool-browse" title="浏览">✋</button>
      <button class="tool-btn" onclick="startPointGroup()" id="tool-point" title="放置点">📍</button>
      <button class="tool-btn" onclick="startDraw('polygon')" id="tool-polygon" title="画多边形">⬡</button>
      <button class="tool-btn" onclick="startDraw('polyline')" id="tool-polyline" title="画折线">〰</button>
      <button class="tool-btn" onclick="toggleEntitySearch()" id="tool-entity" title="搜索实体">🔍</button>
    </div>
    <!-- 实体搜索浮窗 -->
    <div id="entity-search" class="float-panel" style="display:none">
      <input type="text" id="ent-q" class="input input-sm" placeholder="搜索实体名称..." oninput="searchEntities()">
      <div id="ent-results" style="max-height:220px;overflow-y:auto"></div>
      <div style="text-align:right;margin-top:6px"><button class="btn btn-xs" onclick="toggleEntitySearch()">关闭</button></div>
    </div>
    <!-- 点组编辑浮窗 -->
    <div id="pg-editor" class="float-panel" style="display:none;left:12px;right:auto;top:56px;width:320px">
      <div style="font-weight:700;font-size:13px;margin-bottom:8px">📍 编辑点组 — 点击地图添加点</div>
      <div id="pg-point-list" style="max-height:180px;overflow-y:auto"></div>
      <div style="display:flex;gap:6px;margin-top:8px">
        <input type="text" id="pg-name" class="input input-sm" placeholder="点组名称" style="flex:1">
        <button class="btn btn-xs btn-primary" onclick="savePointGroup()">保存</button>
        <button class="btn btn-xs" onclick="cancelPointGroup()">取消</button>
      </div>
    </div>
  </section>

  <!-- ═══ 编辑面板 ═══ -->
  <section class="wb-bottom">
    <div id="no-case-hint" class="no-case">← 选择一个用例或点击 ＋ 新建</div>
    <div id="case-editor" style="display:none">
      <div class="editor-row">
        <label class="row-label">指令</label>
        <input type="text" id="inp-instruction" class="input" placeholder="输入中文自然语言指令，如「从北大东门出发绕清华跑一圈」" style="flex:1">
      </div>
      <div class="editor-row" style="align-items:flex-start">
        <label class="row-label" style="padding-top:6px">指标</label>
        <div style="flex:1">
          <div id="metric-list"></div>
          <div class="metric-add-row">
            <select id="sel-add-metric" class="input input-sm" style="max-width:260px">
              <option value="">+ 添加评分指标...</option>
              <optgroup label="📏 距离">
                <option value="max_total_distance">路径总长上限</option>
                <option value="min_total_distance">路径总长下限</option>
                <option value="target_distance">目标里程</option>
                <option value="reference_distance">参考里程</option>
              </optgroup>
              <optgroup label="📍 途经与闭环">
                <option value="waypoint_coverage">必经点覆盖</option>
                <option value="loop_to_start">闭环返回</option>
              </optgroup>
              <optgroup label="🔄 去回程">
                <option value="no_backtrack_on_return">回程不重走</option>
                <option value="require_same_route_return">要求原路返回</option>
              </optgroup>
              <optgroup label="🔀 转向"><option value="turn_preference">转向偏好</option></optgroup>
              <optgroup label="⭕ 区域绕行">
                <option value="region_enclosure">区域包围</option>
                <option value="region_penetration">区域穿入禁止</option>
                <option value="region_orbit_uniformity">绕行均衡性</option>
                <option value="orbit_boundary_proximity">贴边最近路线</option>
                <option value="orbit_parallel_corridors">冗余平行走廊</option>
              </optgroup>
              <optgroup label="〰 走廊">
                <option value="corridor_follow_uniformity">走廊跟随均衡</option>
                <option value="must_pass_corridor">必经走廊</option>
                <option value="corridor_segment_min_length">走廊段落长度</option>
                <option value="prefer_corridor">偏好走廊</option>
              </optgroup>
              <optgroup label="🔁 多圈"><option value="multi_lap">多圈检测</option></optgroup>
            </select>
          </div>
        </div>
      </div>
      <div class="editor-row" style="justify-content:flex-end;gap:8px;border-top:1px solid var(--border-light);padding-top:10px;margin-top:4px">
        <button class="btn btn-sm btn-danger" onclick="deleteCurrentCase()">删除用例</button>
        <button class="btn btn-sm btn-primary" onclick="saveCase()">💾 保存用例</button>
      </div>
    </div>
  </section>
</div>
{% endblock %}

{% block scripts %}
<script>
// ================================================================
//  全局状态
// ================================================================
const BID='{{benchmark_id}}';
let currentCaseId=null, caseData=null, mapObj=null;
let networkLayer=null, entityLayer=null, geoLayers={}, waypointMarkers=[];
let currentMapId=null, allEntities=[];
// 点组编辑状态
let pgEditing=false, pgPoints=[], pgClickHandler=null;

// ================================================================
//  指标定义注册表 —— 每个指标的参数 UI 定义
//  t: number|check|select|georef|georef_pg(点组引用)
//  gt: georef 限定的几何类型 polygon|polyline|point_group
// ================================================================
const MD={
  max_total_distance:        {label:'路径总长上限',icon:'📏', fields:[
    {k:'max_km',l:'最大路程(km)',t:'number',s:0.1,d:5}]},
  min_total_distance:        {label:'路径总长下限',icon:'📏', fields:[
    {k:'min_km',l:'最小路程(km)',t:'number',s:0.1,d:5}]},
  target_distance:           {label:'目标里程',icon:'📏', fields:[
    {k:'target_km',l:'目标(km)',t:'number',s:0.1,d:5},
    {k:'tolerance_km',l:'容差(km)',t:'number',s:0.1,d:0.5}]},
  reference_distance:        {label:'参考里程',icon:'📏', fields:[
    {k:'target_km',l:'参考(km)',t:'number',s:0.1,d:8},
    {k:'tolerance_km',l:'容差(km)',t:'number',s:0.1,d:1},
    {k:'min_km',l:'下界(km)',t:'number',s:0.1,d:null},
    {k:'max_km',l:'上界(km)',t:'number',s:0.1,d:null}]},
  waypoint_coverage:         {label:'必经点覆盖(分组)',icon:'📍', fields:[
    {k:'groups',l:'阶段列表',t:'wp_groups',d:[]},
    {k:'ordered',l:'阶段间要求顺序',t:'check',d:true},
    {k:'default_radius_m',l:'默认半径(m)',t:'number',s:10,d:80}]},
  loop_to_start:             {label:'闭环返回',icon:'🔄', fields:[
    {k:'radius_m',l:'闭环半径(m)',t:'number',s:10,d:200}]},
  no_backtrack_on_return:    {label:'回程不重走',icon:'🔀', fields:[
    {k:'max_overlap_ratio',l:'最大重叠率',t:'number',s:0.01,d:0.15}]},
  require_same_route_return: {label:'要求原路返回',icon:'🔀', fields:[
    {k:'min_overlap_ratio',l:'最小重叠率',t:'number',s:0.01,d:0.7}]},
  turn_preference:           {label:'转向偏好',icon:'🔀', fields:[
    {k:'minimize',l:'最小化',t:'select',opts:['left_turn','right_turn','both'],d:'left_turn'},
    {k:'angle_threshold_deg',l:'角度阈值(°)',t:'number',s:5,d:25},
    {k:'max_count',l:'最大次数',t:'number',s:1,d:6}]},
  region_enclosure:          {label:'区域包围',icon:'⭕', fields:[
    {k:'polygon',l:'目标区域多边形',t:'georef',gt:'polygon'},
    {k:'closure_radius_m',l:'闭合半径(m)',t:'number',s:10,d:150},
    {k:'min_containment_ratio',l:'最小包围比例',t:'number',s:0.05,d:1.0},
    {k:'max_violation_ratio',l:'允许穿入比例',t:'number',s:0.01,d:0}]},
  region_penetration:        {label:'区域穿入禁止',icon:'⭕', fields:[
    {k:'polygon',l:'外围多边形',t:'georef',gt:'polygon'},
    {k:'core_polygon',l:'核心多边形',t:'georef',gt:'polygon'},
    {k:'max_interior_ratio',l:'最大穿入比例',t:'number',s:0.01,d:0.02},
    {k:'max_interior_run_m_val',l:'最大连续穿入(m)',t:'number',s:10,d:100}]},
  region_orbit_uniformity:   {label:'绕行均衡性',icon:'⭕', fields:[
    {k:'polygon',l:'区域多边形',t:'georef',gt:'polygon'},
    {k:'max_boundary_cv',l:'边界CV',t:'number',s:0.05,d:0.45},
    {k:'max_ring_cv',l:'环带CV',t:'number',s:0.05,d:0.30},
    {k:'max_side_cv',l:'四向CV',t:'number',s:0.05,d:0.35},
    {k:'min_exterior_ratio',l:'最小外围占比',t:'number',s:0.05,d:0.85},
    {k:'min_sector_coverage',l:'最小扇区覆盖',t:'number',s:0.05,d:0.625}]},
  orbit_boundary_proximity:  {label:'贴边最近路线',icon:'⭕', fields:[
    {k:'polygon',l:'区域多边形',t:'georef',gt:'polygon'},
    {k:'tolerance_m',l:'容忍偏移(m)',t:'number',s:10,d:80},
    {k:'max_excess_ratio',l:'最大excess比',t:'number',s:0.01,d:0.12},
    {k:'n_sectors',l:'扇区数',t:'number',s:1,d:16}]},
  orbit_parallel_corridors:  {label:'冗余平行走廊',icon:'⭕', fields:[
    {k:'polygon',l:'区域多边形',t:'georef',gt:'polygon'},
    {k:'angle_tol_deg',l:'角度容忍(°)',t:'number',s:5,d:30},
    {k:'max_parallel_ratio',l:'最大平行比',t:'number',s:0.01,d:0.15}]},
  corridor_follow_uniformity:{label:'走廊跟随均衡',icon:'〰', fields:[
    {k:'corridor',l:'走廊折线',t:'georef',gt:'polyline'},
    {k:'buffer_m',l:'缓冲区(m)',t:'number',s:10,d:120},
    {k:'max_cv',l:'最大CV',t:'number',s:0.05,d:0.60},
    {k:'max_mean_deviation_m',l:'最大平均偏离(m)',t:'number',s:10,d:80}]},
  must_pass_corridor:        {label:'必经走廊',icon:'〰', fields:[
    {k:'corridor',l:'走廊折线',t:'georef',gt:'polyline'},
    {k:'buffer_m',l:'缓冲区(m)',t:'number',s:10,d:120},
    {k:'min_continuous_m',l:'最小连续段(m)',t:'number',s:10,d:200}]},
  corridor_segment_min_length:{label:'走廊段落长度',icon:'〰', fields:[
    {k:'corridor',l:'走廊折线',t:'georef',gt:'polyline'},
    {k:'min_length_m',l:'最小总长(m)',t:'number',s:10,d:500},
    {k:'buffer_m',l:'缓冲区(m)',t:'number',s:10,d:80}]},
  prefer_corridor:           {label:'偏好走廊',icon:'〰', fields:[
    {k:'corridor',l:'走廊折线',t:'georef',gt:'polyline'},
    {k:'buffer_m',l:'缓冲区(m)',t:'number',s:10,d:150},
    {k:'min_coverage_ratio',l:'最小覆盖率',t:'number',s:0.05,d:0.35}]},
  multi_lap:                 {label:'多圈检测',icon:'🔁', fields:[
    {k:'polygon',l:'区域多边形',t:'georef',gt:'polygon'},
    {k:'target_laps',l:'目标圈数',t:'number',s:1,d:1},
    {k:'lap_tolerance',l:'圈数容差',t:'number',s:0.05,d:0.35}]},
};

// ================================================================
//  初始化
// ================================================================
async function init(){
  mapObj=L.map('map',{zoomControl:false}).setView([39.99,116.33],14);
  L.control.zoom({position:'bottomright'}).addTo(mapObj);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OSM'}).addTo(mapObj);
  const maps=await(await fetch('/api/maps')).json();
  const sel=document.getElementById('sel-map');
  maps.forEach(m=>{const o=document.createElement('option');o.value=m.id;o.textContent=m.name||m.filename||m.id;sel.appendChild(o)});
  await loadCases();
  document.getElementById('sel-add-metric').onchange=function(){if(this.value){addMetric(this.value);this.value=''}};
  mapObj.on(L.Draw.Event.CREATED, onDrawCreated);
}

// ================================================================
//  地图
// ================================================================
function catColor(c){if(!c)return'#546E7A';if(c.startsWith('green')||c.startsWith('leisure'))return'#16a34a';if(c.startsWith('education'))return'#ea580c';if(c.startsWith('water')||c.startsWith('nature/water'))return'#2563eb';if(c.startsWith('sport'))return'#7c3aed';if(c.startsWith('food'))return'#dc2626';return'#546E7A'}

async function switchMap(mid){
  currentMapId=mid;
  if(networkLayer){mapObj.removeLayer(networkLayer);networkLayer=null}
  if(entityLayer){mapObj.removeLayer(entityLayer);entityLayer=null}
  if(!mid)return;
  const net=await(await fetch(`/api/maps/${mid}/network`)).json();
  networkLayer=L.geoJSON(net,{style:{color:'#94a3b8',weight:1,opacity:0.45},interactive:false}).addTo(mapObj);
  const ent=await(await fetch(`/api/maps/${mid}/entities`)).json();
  allEntities=ent.features||[];
  entityLayer=L.geoJSON(ent,{
    style:f=>({color:catColor(f.properties.category),weight:2,fillOpacity:0.1,dashArray:f.properties.geom_type==='polyline'?'6,4':null}),
    pointToLayer:(f,ll)=>L.circleMarker(ll,{radius:4,fillColor:catColor(f.properties.category),fillOpacity:0.8,stroke:false}),
    onEachFeature:(f,layer)=>{if(f.properties.name)layer.bindTooltip(f.properties.name,{sticky:true,className:'entity-tip'});layer.on('click',()=>onEntityClick(f))}
  }).addTo(mapObj);
  if(networkLayer.getBounds().isValid())mapObj.fitBounds(networkLayer.getBounds(),{padding:[30,30]});
}

function setMapMode(mode){
  document.querySelectorAll('.map-toolbar .tool-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('tool-'+mode);if(btn)btn.classList.add('active');
  mapObj.getContainer().style.cursor=mode==='browse'?'':'crosshair';
}

// ================================================================
//  用例管理
// ================================================================
async function loadCases(){
  const cases=await(await fetch(`/api/benchmarks/${BID}/cases`)).json();
  document.getElementById('case-list').innerHTML=cases.map(c=>`
    <div class="item ${c.id===currentCaseId?'active':''}" onclick="selectCase('${c.id}')">
      <span class="item-text">${c.instruction||'(未填指令)'}</span>
      <span class="badge">${c.id.slice(0,4)}</span>
    </div>`).join('')||'<div class="muted" style="padding:12px;font-size:12px;text-align:center">暂无用例</div>';
}
async function addCase(){
  if(!currentMapId){alert('请先在左下角选择一张地图');return}
  const res=await fetch(`/api/benchmarks/${BID}/cases`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({map_db_id:currentMapId})});
  const{id}=await res.json();await loadCases();selectCase(id);
}
async function selectCase(cid){
  currentCaseId=cid;
  caseData=await(await fetch(`/api/cases/${cid}`)).json();
  // 解析几何坐标
  (caseData.geometries||[]).forEach(g=>{if(typeof g.coordinates==='string')g.coordinates=JSON.parse(g.coordinates)});
  if(caseData.map_db_id&&caseData.map_db_id!==currentMapId){document.getElementById('sel-map').value=caseData.map_db_id;await switchMap(caseData.map_db_id)}
  document.getElementById('no-case-hint').style.display='none';
  document.getElementById('case-editor').style.display='block';
  document.getElementById('inp-instruction').value=caseData.instruction||'';
  renderGeoBank();renderMetrics();loadCases();
}
async function saveCase(){
  if(!currentCaseId)return;
  const metrics=collectMetrics();
  const geometries=(caseData.geometries||[]).map(g=>({id:g.id,name:g.name,geom_type:g.geom_type,coordinates:g.coordinates,source_entity_id:g.source_entity_id,color:g.color}));
  await fetch(`/api/cases/${currentCaseId}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({map_db_id:currentMapId,instruction:document.getElementById('inp-instruction').value,geometries,metrics,notes:caseData.notes||''})});
  await selectCase(currentCaseId);showToast('✓ 已保存');
}
async function deleteCurrentCase(){
  if(!currentCaseId||!confirm('确定删除此用例？'))return;
  await fetch(`/api/cases/${currentCaseId}`,{method:'DELETE'});
  currentCaseId=null;caseData=null;
  document.getElementById('case-editor').style.display='none';
  document.getElementById('no-case-hint').style.display='flex';
  clearGeoLayers();loadCases();
}

// ================================================================
//  几何对象库
// ================================================================
function renderGeoBank(){
  const geos=caseData?.geometries||[];
  document.getElementById('geo-list').innerHTML=geos.map(g=>{
    const icon=g.geom_type==='polygon'?'⬡':g.geom_type==='polyline'?'〰':'📍';
    const n=Array.isArray(g.coordinates)?g.coordinates.length:0;
    const meta=g.geom_type==='point_group'?`${n} 个点`:`${n} 顶点`;
    return`<div class="item geo-item" onclick="focusGeo('${g.id}')">
      <span class="geo-icon" style="color:${g.color||'#2563eb'}">${icon}</span>
      <span class="geo-label">${g.name}</span>
      <span class="geo-meta">${meta}</span>
      <button class="btn-icon" onclick="event.stopPropagation();editGeo('${g.id}')" title="编辑">✏️</button>
      <button class="btn-icon" onclick="event.stopPropagation();removeGeo('${g.id}')" title="删除">×</button>
    </div>`
  }).join('')||'<div class="muted" style="padding:14px;font-size:12px;text-align:center">点击下方按钮添加几何对象<br>然后在指标中引用它们</div>';
  renderGeoOnMap();
}
function renderGeoOnMap(){
  clearGeoLayers();clearWaypointMarkers();
  (caseData?.geometries||[]).forEach(g=>{
    const coords=g.coordinates;if(!coords||!coords.length)return;
    let layer;
    if(g.geom_type==='polygon'){
      layer=L.polygon(coords.map(c=>[c[0],c[1]]),{color:g.color||'#2563eb',weight:2.5,fillOpacity:0.08,dashArray:null});
    }else if(g.geom_type==='polyline'){
      layer=L.polyline(coords.map(c=>[c[0],c[1]]),{color:g.color||'#2563eb',weight:3});
    }else if(g.geom_type==='point_group'){
      coords.forEach((pt,i)=>{
        if(!pt.lat&&!pt[0])return;
        const lat=pt.lat||pt[0], lon=pt.lon||pt[1];
        const m=L.marker([lat,lon],{icon:L.divIcon({className:'',html:`<div class="wp-num" style="width:24px;height:24px;font-size:12px;position:relative;left:-12px;top:-12px">${i+1}</div>`,iconSize:[0,0]})});
        if(pt.name)m.bindTooltip(pt.name,{permanent:false});
        m.addTo(mapObj);waypointMarkers.push(m);
        if(pt.radius_m){
          const circle=L.circle([lat,lon],{radius:pt.radius_m,color:g.color||'#2563eb',weight:1,fillOpacity:0.06});
          circle.addTo(mapObj);waypointMarkers.push(circle);
        }
      });
      return;
    }
    if(layer){layer.bindTooltip(g.name,{sticky:true});layer.addTo(mapObj);geoLayers[g.id]=layer}
  });
}
function clearGeoLayers(){Object.values(geoLayers).forEach(l=>mapObj.removeLayer(l));geoLayers={}}
function clearWaypointMarkers(){waypointMarkers.forEach(m=>mapObj.removeLayer(m));waypointMarkers=[]}
function focusGeo(gid){const l=geoLayers[gid];if(l&&l.getBounds)mapObj.fitBounds(l.getBounds(),{padding:[50,50]})}
function removeGeo(gid){if(!caseData)return;caseData.geometries=caseData.geometries.filter(g=>g.id!==gid);renderGeoBank();renderMetrics()}
function editGeo(gid){
  const g=(caseData?.geometries||[]).find(x=>x.id===gid);if(!g)return;
  if(g.geom_type==='point_group'){
    // 打开点组编辑器
    pgEditing=true;pgPoints=[...g.coordinates];
    document.getElementById('pg-name').value=g.name;
    document.getElementById('pg-editor').style.display='block';
    renderPgList();
    // 删除旧的，保存时重新创建
    removeGeo(gid);
    enablePgMapClick();
  }
}
function addGeoToBank(name,geomType,coordinates,color,srcEid){
  if(!caseData)return;if(!caseData.geometries)caseData.geometries=[];
  const id='g_'+Math.random().toString(36).slice(2,8);
  caseData.geometries.push({id,name,geom_type:geomType,coordinates,color:color||'#2563eb',source_entity_id:srcEid||null});
  renderGeoBank();renderMetrics();
}

// ── 绘制多边形/折线 ──
let drawHandler=null;
function startDraw(type){
  cancelPointGroup();
  if(drawHandler){drawHandler.disable();drawHandler=null}
  const opts={shapeOptions:{color:type==='polygon'?'#dc2626':'#2563eb',weight:3}};
  drawHandler=type==='polygon'?new L.Draw.Polygon(mapObj,opts):new L.Draw.Polyline(mapObj,opts);
  drawHandler.enable();
  setMapMode(type);
}
function onDrawCreated(e){
  const type=e.layerType,layer=e.layer;
  const geomType=type==='polygon'?'polygon':'polyline';
  const lls=type==='polygon'?layer.getLatLngs()[0]:layer.getLatLngs();
  const coords=lls.map(ll=>[Math.round(ll.lat*1e6)/1e6,Math.round(ll.lng*1e6)/1e6]);
  const name=prompt(`${geomType==='polygon'?'多边形':'折线'}名称：`);
  if(!name)return;
  const color=geomType==='polygon'?'#dc2626':'#2563eb';
  addGeoToBank(name,geomType,coords,color);
  drawHandler=null;setMapMode('browse');
}

// ── 点组编辑 ──
function startPointGroup(){
  if(!caseData){alert('请先选择一个用例');return}
  cancelPointGroup();
  pgEditing=true;pgPoints=[];
  document.getElementById('pg-name').value='';
  document.getElementById('pg-editor').style.display='block';
  renderPgList();enablePgMapClick();
  setMapMode('point');
}
function enablePgMapClick(){
  pgClickHandler=function(e){
    if(!pgEditing)return;
    pgPoints.push({name:'',lat:Math.round(e.latlng.lat*1e6)/1e6,lon:Math.round(e.latlng.lng*1e6)/1e6,radius_m:80});
    renderPgList();renderGeoOnMap();
  };
  mapObj.on('click',pgClickHandler);
}
function cancelPointGroup(){
  pgEditing=false;pgPoints=[];
  document.getElementById('pg-editor').style.display='none';
  if(pgClickHandler){mapObj.off('click',pgClickHandler);pgClickHandler=null}
  setMapMode('browse');
}
function savePointGroup(){
  const name=document.getElementById('pg-name').value.trim();
  if(!name){alert('请输入点组名称');return}
  // 从 DOM 收集最新的编辑值
  document.querySelectorAll('#pg-point-list .wp-row').forEach((row,i)=>{
    if(!pgPoints[i])return;
    pgPoints[i].name=row.querySelector('[data-f="name"]')?.value||'';
    pgPoints[i].radius_m=parseFloat(row.querySelector('[data-f="radius_m"]')?.value)||80;
  });
  addGeoToBank(name,'point_group',pgPoints,'#16a34a');
  cancelPointGroup();
}
function removePgPoint(i){pgPoints.splice(i,1);renderPgList();renderGeoOnMap()}
function renderPgList(){
  // 暂时渲染到地图上
  clearWaypointMarkers();
  pgPoints.forEach((pt,i)=>{
    const m=L.marker([pt.lat,pt.lon],{icon:L.divIcon({className:'',html:`<div class="wp-num" style="width:24px;height:24px;font-size:12px;position:relative;left:-12px;top:-12px">${i+1}</div>`,iconSize:[0,0]})}).addTo(mapObj);
    waypointMarkers.push(m);
    const c=L.circle([pt.lat,pt.lon],{radius:pt.radius_m||80,color:'#16a34a',weight:1,fillOpacity:0.06}).addTo(mapObj);
    waypointMarkers.push(c);
  });
  document.getElementById('pg-point-list').innerHTML=pgPoints.map((pt,i)=>`
    <div class="wp-row">
      <span class="wp-num">${i+1}</span>
      <div class="wp-fields">
        <span class="wp-field name-field"><input class="input input-xs" data-f="name" value="${pt.name||''}" placeholder="名称" style="width:70px"></span>
        <span class="wp-field">lat <input class="input input-xs" value="${pt.lat}" readonly style="width:75px;color:var(--text-3)"></span>
        <span class="wp-field">lon <input class="input input-xs" value="${pt.lon}" readonly style="width:75px;color:var(--text-3)"></span>
        <span class="wp-field">r <input class="input input-xs" data-f="radius_m" value="${pt.radius_m||80}" type="number" step="10" style="width:55px"> m</span>
      </div>
      <button class="btn-icon" onclick="removePgPoint(${i})">×</button>
    </div>`).join('')||'<div class="muted" style="padding:8px;font-size:12px;text-align:center">点击地图添加点位</div>';
}

// ── 实体捕获 ──
function onEntityClick(feature){
  const p=feature.properties;if(!caseData){alert('请先选择用例');return}
  const name=prompt(`将「${p.name||p.category}」添加到几何库，名称：`,p.name||'');if(!name)return;
  let coords=null,geomType='polygon';const geom=feature.geometry;
  if(geom.type==='Polygon'){coords=geom.coordinates[0].map(c=>[c[1],c[0]]);geomType='polygon'}
  else if(geom.type==='LineString'){coords=geom.coordinates.map(c=>[c[1],c[0]]);geomType='polyline'}
  else if(geom.type==='Point'){
    // 点实体添加到正在编辑的点组（如果有）
    if(pgEditing){
      pgPoints.push({name:p.name||name,lat:geom.coordinates[1],lon:geom.coordinates[0],radius_m:80});
      renderPgList();return;
    }
    coords=[{name:p.name||name,lat:geom.coordinates[1],lon:geom.coordinates[0],radius_m:80}];geomType='point_group';
  }
  if(!coords){alert('无法提取几何');return}
  addGeoToBank(name,geomType,coords,catColor(p.category),p.eid);
}

// ── 实体搜索 ──
let entSearchOpen=false;
function toggleEntitySearch(){
  entSearchOpen=!entSearchOpen;
  document.getElementById('entity-search').style.display=entSearchOpen?'block':'none';
  if(entSearchOpen){document.getElementById('ent-q').value='';searchEntities();document.getElementById('ent-q').focus()}
}
function searchEntities(){
  const q=document.getElementById('ent-q').value.toLowerCase();
  const results=allEntities.filter(f=>(f.properties.name||'').toLowerCase().includes(q)).slice(0,30);
  document.getElementById('ent-results').innerHTML=results.map(f=>{
    const p=f.properties;
    return`<div class="ent-item" onclick='onEntityClick(${JSON.stringify(f)});toggleEntitySearch()'>
      <span class="ent-dot" style="background:${catColor(p.category)}"></span>
      <span style="flex:1;font-weight:500">${p.name||'(无名)'}</span>
      <span style="color:var(--text-3);font-size:11px">${p.geom_type}</span>
    </div>`
  }).join('')||'<div class="muted" style="padding:12px;text-align:center">无匹配结果</div>';
}

// ================================================================
//  指标编辑
// ================================================================
function renderMetrics(){
  const ms=caseData?.metrics||[];
  document.getElementById('metric-list').innerHTML=ms.map((m,i)=>{
    const def=MD[m.metric_type];if(!def)return'';
    return`<div class="metric-card" id="mc-${i}">
      <div class="metric-header" onclick="toggleMetric(${i})">
        <span class="tag ${m.is_hard?'tag-hard':'tag-soft'}">${m.is_hard?'硬':'软'}</span>
        <span style="font-size:14px">${def.icon||''}</span>
        <span class="metric-name">${def.label}</span>
        <span class="metric-weight">w=${m.weight}</span>
        <button class="btn-icon" onclick="event.stopPropagation();removeMetric(${i})" title="删除">×</button>
      </div>
      <div class="metric-body" id="mb-${i}" style="display:none">
        <div class="metric-fields">${renderFields(m,def,i)}</div>
        <div class="metric-footer">
          <label style="display:flex;align-items:center;gap:4px">权重 <input type="number" step="0.01" value="${m.weight}" min="0" max="1" class="input input-xs" style="width:65px" data-mi="${i}" data-fk="__weight"></label>
          <label style="display:flex;align-items:center;gap:4px"><input type="checkbox" ${m.is_hard?'checked':''} data-mi="${i}" data-fk="__hard"> 硬约束</label>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderFields(metric,def,mi){
  return def.fields.map(f=>{
    const v=metric.params?.[f.k];const val=v!==undefined&&v!==null?v:f.d;
    if(f.t==='number'){
      return`<div class="field-row"><span class="field-label">${f.l}</span><input type="number" step="${f.s||1}" value="${val??''}" class="input input-xs" data-mi="${mi}" data-fk="${f.k}" placeholder="${f.d??''}"></div>`;
    }
    if(f.t==='check'){
      return`<div class="field-row"><span class="field-label">${f.l}</span><input type="checkbox" ${val?'checked':''} data-mi="${mi}" data-fk="${f.k}"></div>`;
    }
    if(f.t==='select'){
      const opts=f.opts.map(o=>`<option value="${o}" ${val===o?'selected':''}>${o}</option>`).join('');
      return`<div class="field-row"><span class="field-label">${f.l}</span><select class="input input-xs" style="width:120px" data-mi="${mi}" data-fk="${f.k}">${opts}</select></div>`;
    }
    if(f.t==='georef'){
      const geos=(caseData?.geometries||[]).filter(g=>g.geom_type===f.gt);
      const isRef=typeof val==='string'&&val.startsWith('@geo:');
      const selName=isRef?val.slice(5):'';
      const opts=`<option value="">(未选择)</option>`+geos.map(g=>`<option value="@geo:${g.name}" ${g.name===selName?'selected':''}>${g.name}</option>`).join('');
      const hint=geos.length===0?`<span style="color:var(--red);font-size:11px;margin-left:4px">← 请先在几何库中添加${f.gt==='polygon'?'多边形':f.gt==='polyline'?'折线':'点组'}</span>`:'';
      return`<div class="field-row"><span class="field-label">${f.l}</span><select class="input input-xs" style="width:140px" data-mi="${mi}" data-fk="${f.k}">${opts}</select>${hint}</div>`;
    }
    if(f.t==='wp_groups'){
      // 阶段列表：每个阶段引用一个点组 + 最少经过数
      const pgs=(caseData?.geometries||[]).filter(g=>g.geom_type==='point_group');
      const stages=Array.isArray(val)?val:[];
      const rows=stages.map((st,si)=>{
        const sel=typeof st.points==='string'&&st.points.startsWith('@geo:')?st.points.slice(5):'';
        const opts=`<option value="">(未选择)</option>`+pgs.map(g=>{
          const n=Array.isArray(g.coordinates)?g.coordinates.length:0;
          return`<option value="@geo:${g.name}" ${g.name===sel?'selected':''}>${g.name} (${n}点)</option>`;
        }).join('');
        return`<div class="wp-row">
          <span class="wp-num">${si+1}</span>
          <div class="wp-fields">
            <span class="wp-field">点组 <select class="input input-xs" style="width:130px" data-mi="${mi}" data-gsi="${si}" data-gsf="points">${opts}</select></span>
            <span class="wp-field">至少经过 <input type="number" min="1" step="1" value="${st.min_count||1}" class="input input-xs" style="width:50px" data-mi="${mi}" data-gsi="${si}" data-gsf="min_count"> 个</span>
          </div>
          <button class="btn-icon" onclick="removeWpStage(${mi},${si})" title="删除阶段">×</button>
        </div>`;
      }).join('');
      const hint=pgs.length===0?`<div style="color:var(--red);font-size:11px;padding:3px 0">← 请先在左侧几何库中「📍 创建点组」</div>`:'';
      return`<div class="field-group">
        <div class="field-group-title">${f.l} — 有序模式下按阶段依次完成</div>
        ${rows||'<div class="muted" style="font-size:12px;padding:2px 0">暂无阶段，点击下方添加</div>'}
        ${hint}
        <button class="btn btn-xs" onclick="addWpStage(${mi})" style="margin-top:6px">+ 添加阶段</button>
      </div>`;
    }
    return'';
  }).join('');
}

function toggleMetric(i){
  const el=document.getElementById('mb-'+i);
  const card=document.getElementById('mc-'+i);
  const show=el.style.display==='none';
  el.style.display=show?'block':'none';
  card.classList.toggle('expanded',show);
}
function addMetric(type){
  if(!caseData)return;if(!caseData.metrics)caseData.metrics=[];
  const def=MD[type];if(!def)return;
  const params={};def.fields.forEach(f=>{if(f.d!==undefined&&f.d!==null)params[f.k]=f.d});
  caseData.metrics.push({id:'m_'+Math.random().toString(36).slice(2,8),metric_type:type,params,weight:0.08,is_hard:0});
  renderMetrics();
}
function removeMetric(i){caseData.metrics.splice(i,1);renderMetrics()}

// ── 途经阶段的增删 ──
function addWpStage(mi){
  // 先从 DOM 同步所有正在编辑的值，避免丢失
  caseData.metrics=collectMetrics();
  const m=caseData.metrics[mi];
  if(!Array.isArray(m.params.groups))m.params.groups=[];
  m.params.groups.push({points:'',min_count:1});
  renderMetrics();
  // 保持该指标展开
  document.getElementById('mb-'+mi).style.display='block';
  document.getElementById('mc-'+mi).classList.add('expanded');
}
function removeWpStage(mi,si){
  caseData.metrics=collectMetrics();
  const groups=caseData.metrics[mi].params.groups;
  if(Array.isArray(groups))groups.splice(si,1);
  renderMetrics();
  document.getElementById('mb-'+mi).style.display='block';
  document.getElementById('mc-'+mi).classList.add('expanded');
}

function collectMetrics(){
  if(!caseData?.metrics)return[];
  return caseData.metrics.map((m,i)=>{
    const params={...m.params};const def=MD[m.metric_type];if(!def)return m;
    def.fields.forEach(f=>{
      if(f.t==='wp_groups'){
        // 收集阶段列表
        const stageEls=document.querySelectorAll(`[data-mi="${i}"][data-gsf]`);
        const stages={};
        stageEls.forEach(el=>{
          const si=el.dataset.gsi;
          if(!stages[si])stages[si]={};
          let v=el.value;
          if(el.dataset.gsf==='min_count')v=Math.max(1,parseInt(v)||1);
          stages[si][el.dataset.gsf]=v;
        });
        params[f.k]=Object.keys(stages).sort((a,b)=>a-b).map(k=>stages[k]);
        return;
      }
      const el=document.querySelector(`[data-mi="${i}"][data-fk="${f.k}"]`);if(!el)return;
      if(f.t==='check')params[f.k]=el.checked;
      else if(f.t==='number'){const v=parseFloat(el.value);params[f.k]=isNaN(v)?null:v}
      else params[f.k]=el.value||null;
    });
    const wEl=document.querySelector(`[data-mi="${i}"][data-fk="__weight"]`);
    const hEl=document.querySelector(`[data-mi="${i}"][data-fk="__hard"]`);
    return{id:m.id,metric_type:m.metric_type,params,weight:wEl?parseFloat(wEl.value)||0.08:m.weight,is_hard:hEl?(hEl.checked?1:0):m.is_hard};
  });
}

// ================================================================
//  导出
// ================================================================
async function exportBenchmark(){
  const res=await fetch(`/api/benchmarks/${BID}/export`);
  const data=await res.json();
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='benchmark.json';a.click();
  showToast('✓ 已导出 benchmark.json');
}

function showToast(msg){
  const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);
  setTimeout(()=>t.classList.add('show'),10);setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300)},2000);
}

init();
</script>
{% endblock %}
